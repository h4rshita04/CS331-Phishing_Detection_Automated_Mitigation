version: "3.9"

services:
  db:
    image: postgres:15
    container_name: sentinel_db_container
    restart: always
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: software_engineering123
      POSTGRES_DB: sentinel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
